name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  kernel-amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: make deps

      - name: Build amd64 Firecracker kernel
        run: make kernel-amd64

      - name: Check Firecracker kernel config
        run: make check-kernel-config-amd64

      - name: Verify artifact checksum
        run: sha256sum -c dist/kernels/microagent-kernel-6.1.155-firecracker-amd64.sha256
